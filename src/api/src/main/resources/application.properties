# Datasource — the same Postgres the Python pipeline writes (fact table).
# No jdbc.url in %test: Quarkus Dev Services provisions an ephemeral
# Postgres container so tests never touch real data.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=diligence
quarkus.datasource.password=diligence
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/diligence
%prod.quarkus.datasource.jdbc.url=${DATABASE_JDBC_URL:jdbc:postgresql://localhost:5433/diligence}

# Python owns the schema until #29 — this service only ever validates.
quarkus.hibernate-orm.database.generation=validate

# Flyway carries a byte-equivalent MIRROR of the Python DDL so tests and
# fresh environments get the table; baseline tolerates databases the
# pipeline already initialised.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
%test.quarkus.flyway.clean-at-start=true

# The Next.js site runs on 3000 and nothing else claims 8080, but keep
# the API off the default port to make collisions impossible in demos.
quarkus.http.port=8082
%test.quarkus.http.test-port=0
